[package]
name = "gix-actor-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.gix-actor]
path = ".."

[workspace]
members = ["."]

[profile.release]
debug = 1

[[bin]]
name = "actors"
path = "fuzz_targets/actors.rs"
test = false
doc = false
