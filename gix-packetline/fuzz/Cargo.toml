[package]
name = "gix-packetline-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.gix-packetline]
path = ".."
features = ["blocking-io"]

[workspace]
members = ["."]

[profile.release]
debug = 1

[[bin]]
name = "packet_lines"
path = "fuzz_targets/packet_lines.rs"
test = false
doc = false
