[package]
name = "gix-index-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
filetime = "0.2.27"
libfuzzer-sys = "0.4"

[dependencies.gix-index]
path = ".."
features = ["sha1"]

[dependencies.gix-object]
path = "../../gix-object"

# Prevent this from interfering with workspaces
[workspace]
members = ["."]

[profile.release]
debug = 1

[[bin]]
name = "index_file"
path = "fuzz_targets/index_file.rs"
test = false
doc = false
