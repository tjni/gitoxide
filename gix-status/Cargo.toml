lints.workspace = true

[package]
name = "gix-status"
version = "0.32.0"
repository = "https://github.com/GitoxideLabs/gitoxide"
license = "MIT OR Apache-2.0"
description = "A crate of the gitoxide project dealing with 'git status'-like functionality"
authors = ["Sebastian Thiel <sebastian.thiel@icloud.com>", "Pascal Kuthe <pascal.kuthe@semimod.de>"]
edition = "2024"
include = ["/src/**/*", "/LICENSE-*"]
rust-version = "1.85"

[lib]
doctest = false

[features]
## Enable support for the SHA-1 hash by enabling the respective feature in the `gix-hash` crate.
sha1 = ["gix-hash/sha1"]
## Enable support for the SHA-256 hash by enabling the respective feature in the `gix-hash` crate.
sha256 = ["gix-hash/sha256"]
## Add support for tracking rewrites along with checking for worktree modifications.
worktree-rewrites = ["dep:gix-dir", "dep:gix-diff"]
## Enable parallel algorithms.
parallel = ["gix-features/parallel"]

[dependencies]
gix-index = { version = "^0.53.0", path = "../gix-index" }
gix-fs = { version = "^0.21.2", path = "../gix-fs" }
gix-hash = { version = "^0.25.1", path = "../gix-hash" }
gix-object = { version = "^0.62.0", path = "../gix-object" }
gix-path = { version = "^0.12.1", path = "../gix-path" }
gix-features = { version = "^0.48.1", path = "../gix-features", features = ["progress"] }
gix-filter = { version = "^0.32.0", path = "../gix-filter" }
gix-worktree = { version = "^0.54.0", path = "../gix-worktree", default-features = false, features = ["attributes"] }
gix-pathspec = { version = "^0.18.1", path = "../gix-pathspec" }

gix-dir = { version = "^0.27.0", path = "../gix-dir", optional = true }
gix-diff = { version = "^0.65.0", path = "../gix-diff", default-features = false, features = ["blob"], optional = true }

thiserror = "2.0.18"
filetime = "0.2.29"
bstr = { version = "1.12.0", default-features = false }

document-features = { version = "0.2.0", optional = true }

[target.'cfg(not(target_has_atomic = "64"))'.dependencies]
portable-atomic = "1"

[target.'cfg(windows)'.dependencies]
hashbrown = "0.16.0"
windows-sys = { version = "0.61.1", features = [
    "Win32_Foundation",
    "Win32_Storage_FileSystem",
    # Needed for `SECURITY_ATTRIBUTES` in the signature of `CreateFileW`,
    # which is gated behind this windows-sys feature even when the call passes null.
    "Win32_Security",
] }

[dev-dependencies]
gix-status = { path = ".", features = ["worktree-rewrites", "parallel"] }
gix-hash = { path = "../gix-hash", features = ["sha1"] }
gix-testtools = { path = "../tests/tools", default-features = false }
gix-index = { path = "../gix-index" }
gix-fs = { path = "../gix-fs" }
gix-diff = { path = "../gix-diff" }
gix-filter = { path = "../gix-filter" }
gix-dir = { path = "../gix-dir" }
gix-odb = { path = "../gix-odb" }
gix-object = { path = "../gix-object" }
gix-pathspec = { path = "../gix-pathspec" }
gix-worktree = { path = "../gix-worktree" }
pretty_assertions = "1.4.0"

[package.metadata.docs.rs]
features = ["sha1", "document-features", "worktree-rewrites"]
